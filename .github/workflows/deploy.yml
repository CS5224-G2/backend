name: Deploy Services to ECS

on:
  push:
    branches: [production]
    paths:
      - "**"
      - "!infra/**"
      - "!scripts/**"
      - "!README.md"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: ap-southeast-1

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    permissions:
      id-token: write   # for OIDC-based AWS auth (if using)
      contents: read

    steps:
      # ── Checkout ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── AWS Credentials ──────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── ECR Login ────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Determine names ──────────────────────────────────────────
      - name: Set environment variables
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          echo "DEPLOY_ENV=${ENV}" >> $GITHUB_ENV
          echo "BACKEND_ECR_REPOSITORY=cyclelink-${ENV}-backend" >> $GITHUB_ENV
          echo "BIKE_ROUTE_ECR_REPOSITORY=cyclelink-${ENV}-bike-route" >> $GITHUB_ENV
          echo "ECS_CLUSTER=cyclelink-${ENV}-cluster" >> $GITHUB_ENV
          echo "BACKEND_ECS_SERVICE=cyclelink-${ENV}-backend" >> $GITHUB_ENV
          echo "BIKE_ROUTE_ECS_SERVICE=cyclelink-${ENV}-bike-route" >> $GITHUB_ENV

      # ── Build & Push ─────────────────────────────────────────────
      - name: Build, tag, and push Docker images
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_TAG="${{ github.sha }}"
          
          # Backend
          BACKEND_FULL_IMAGE="${ECR_REGISTRY}/${BACKEND_ECR_REPOSITORY}"
          docker build \
            -f ./framework/Dockerfile \
            -t "${BACKEND_FULL_IMAGE}:${IMAGE_TAG}" \
            -t "${BACKEND_FULL_IMAGE}:latest" \
            .
          docker push "${BACKEND_FULL_IMAGE}:${IMAGE_TAG}"
          docker push "${BACKEND_FULL_IMAGE}:latest"

          # Bike Route
          BIKE_ROUTE_FULL_IMAGE="${ECR_REGISTRY}/${BIKE_ROUTE_ECR_REPOSITORY}"
          docker build \
            -f ./route/Dockerfile \
            -t "${BIKE_ROUTE_FULL_IMAGE}:${IMAGE_TAG}" \
            -t "${BIKE_ROUTE_FULL_IMAGE}:latest" \
            .
          docker push "${BIKE_ROUTE_FULL_IMAGE}:${IMAGE_TAG}"
          docker push "${BIKE_ROUTE_FULL_IMAGE}:latest"

      # ── Deploy to ECS ────────────────────────────────────────────
      - name: Force new ECS deployment (Backend)
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${BACKEND_ECS_SERVICE}" \
            --force-new-deployment \
            --region "${AWS_REGION}"

      - name: Force new ECS deployment (Bike Route)
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${BIKE_ROUTE_ECS_SERVICE}" \
            --force-new-deployment \
            --region "${AWS_REGION}"

      # ── Wait for stability ───────────────────────────────────────
      - name: Wait for ECS service stability
        run: |
          echo "Waiting for ECS service to stabilise…"
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${BACKEND_ECS_SERVICE}" "${BIKE_ROUTE_ECS_SERVICE}" \
            --region "${AWS_REGION}"
          echo "✅ Deployment complete!"
